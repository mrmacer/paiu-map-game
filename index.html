<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Great PAIU Escape</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #fff; color: #111; display: flex; flex-direction: column; overflow: hidden; }
    #game-title { font-size: 22px; font-weight: 600; text-align: center; padding: 0.6rem 0 0.3rem; flex-shrink: 0; }
    #app { flex: 1; display: flex; flex-direction: column; padding: 0.6rem 1rem 0.5rem; max-width: 960px; width: 100%; margin: 0 auto; min-height: 0; }
    #progress-bar { height: 4px; background: #e5e5e5; border-radius: 2px; margin-bottom: 0.6rem; overflow: hidden; flex-shrink: 0; }
    #progress-fill { height: 100%; background: #1D9E75; border-radius: 2px; transition: width 0.3s ease; }
    #score-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 0.6rem; padding-bottom: 0.6rem; border-bottom: 1px solid #e5e5e5; flex-shrink: 0; }
    #prompt-box { font-size: 18px; font-weight: 500; flex: 1; }
    #score-display { font-size: 13px; color: #666; white-space: nowrap; }
    #timer-display { font-size: 13px; color: #666; white-space: nowrap; font-variant-numeric: tabular-nums; min-width: 38px; text-align: right; }
    #feedback { font-size: 14px; font-weight: 500; min-width: 70px; text-align: right; }
    #game-area { flex: 1; display: flex; gap: 8px; min-height: 0; }
    #map-container { flex: 1; min-height: 0; position: relative; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; background: #f5f5f5; }
    #map-container svg { display: block; width: 100%; height: 100%; }
    #iu-list { width: 150px; flex-shrink: 0; border: 1px solid #ddd; border-radius: 8px; overflow-y: auto; background: #fafafa; padding: 6px 4px; }
    #iu-list h3 { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: #aaa; text-align: center; margin-bottom: 4px; }
    .iu-item { font-size: 12px; padding: 3px 6px; border-radius: 4px; color: #888; transition: background 0.3s, color 0.3s; white-space: nowrap; }
    .iu-item.done { background: #1D9E75; color: #fff; font-weight: 600; }
    .iu-item.crown { background: #1D9E75; color: #fff; font-weight: 600; }
    .iu-region { cursor: pointer; stroke: #fff; stroke-width: 1; transition: opacity 0.15s; }
    .iu-region:hover { opacity: 0.75; }
    .iu-region.correct { fill: #1D9E75 !important; pointer-events: none; animation: correctPulse 0.4s ease-out; }
    @keyframes correctPulse { 0%{opacity:1} 40%{opacity:0.6;filter:brightness(1.5)} 100%{opacity:1} }
    .iu-region.wrong { animation: shake 0.3s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
    .iu-region text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 18px; font-weight: 700; fill: #fff; stroke: rgba(0,0,0,0.5); stroke-width: 3px; paint-order: stroke fill; }
    #win-screen { display: none; flex: 1; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 1.5rem 1rem; overflow-y: auto; }
    #win-screen h2 { font-size: 26px; font-weight: 600; margin-bottom: 0.4rem; }
    #win-screen > p { color: #555; font-size: 14px; margin-bottom: 1rem; }
    #name-form { margin-bottom: 1.2rem; }
    #name-form input { padding: 7px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; width: 180px; margin-right: 6px; outline: none; }
    #name-form input:focus { border-color: #1D9E75; }
    #name-form button { padding: 7px 16px; border: none; border-radius: 6px; background: #1D9E75; color: #fff; cursor: pointer; font-size: 14px; }
    #name-form button:hover { background: #178a63; }
    #leaderboard { width: 100%; max-width: 420px; margin: 0 auto 1.2rem; }
    #leaderboard h3 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #aaa; margin-bottom: 0.5rem; }
    #leaderboard-list { list-style: none; }
    #leaderboard-list li { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
    #leaderboard-list li.top { font-weight: 600; color: #1D9E75; }
    #restart-btn { padding: 9px 22px; border: 1px solid #ccc; border-radius: 6px; background: transparent; color: #111; cursor: pointer; font-size: 14px; }
    #restart-btn:hover { background: #f0f0f0; }
  </style>
</head>

  const IU_COUNT = 29;
  let queue = [], score = 0, attempts = 0, current = null;
  let gameTime = 0, timerInterval = null, firstGuess = true;

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function initGame() {
    const regions = Array.from(document.querySelectorAll('.iu-region'));
    document.querySelectorAll('.iu-region text, .iu-region image').forEach(t => t.remove());
    regions.forEach(r => {
      r.classList.remove('correct', 'wrong');
      const origFill = r.getAttribute('data-orig-fill') || r.getAttribute('fill');
      if (!r.getAttribute('data-orig-fill')) r.setAttribute('data-orig-fill', origFill);
      r.setAttribute('fill', origFill);
      r.style.pointerEvents = '';
    });

    queue = shuffle(regions.map(r => r.id));
    score = 0;
    attempts = 0;

    document.getElementById('win-screen').style.display = 'none';
    document.getElementById('game-area').style.display = 'flex';
    document.getElementById('score-bar').style.display = 'flex';
    document.getElementById('progress-bar').style.display = 'block';
    initIUList();

    clearInterval(timerInterval);
    gameTime = 0;
    document.getElementById('timer-display').textContent = '0:00';
    timerInterval = setInterval(() => {
      gameTime++;
      const m = Math.floor(gameTime / 60);
      const s = gameTime % 60;
      document.getElementById('timer-display').textContent = m + ':' + String(s).padStart(2, '0');
    }, 1000);

    updateScore();
    nextQuestion();
  }

  function updateScore() {
    document.getElementById('score').textContent = score;
    document.getElementById('total').textContent = attempts;
  }

  function nextQuestion() {
    if (queue.length === 0) { showWin(); return; }
    current = queue[0];
    firstGuess = true;
    const num = current.replace(/^iu/i, '');
    document.getElementById('target-label').textContent = 'IU ' + num;
    document.getElementById('feedback').textContent = '';
    const pct = ((IU_COUNT - queue.length) / IU_COUNT) * 100;
    document.getElementById('progress-fill').style.width = pct + '%';
  }

  function formatTime(secs) {
    return Math.floor(secs / 60) + ':' + String(secs % 60).padStart(2, '0');
  }

  function loadScores() {
    try { return JSON.parse(localStorage.getItem('paiu_scores') || '[]'); }
    catch { return []; }
  }

  function renderLeaderboard() {
    const scores = loadScores();
    const list = document.getElementById('leaderboard-list');
    if (scores.length === 0) {
      list.innerHTML = '<li style="color:#aaa;justify-content:center">No scores yet — be the first!</li>';
    } else {
      list.innerHTML = scores.map((s, i) =>
        `<li class="${i === 0 ? 'top' : ''}">
          <span>${i + 1}. ${s.name}</span>
          <span>${s.score}/${IU_COUNT} &nbsp;·&nbsp; ${formatTime(s.time)} &nbsp;·&nbsp; ${s.attempts} tries</span>
        </li>`
      ).join('');
    }
  }

  function showWin() {
    clearInterval(timerInterval);
    document.getElementById('game-area').style.display = 'none';
    document.getElementById('score-bar').style.display = 'none';
    document.getElementById('progress-bar').style.display = 'none';
    document.getElementById('win-total').textContent = IU_COUNT;
    document.getElementById('win-score').textContent = score;
    document.getElementById('win-attempts').textContent = attempts;
    document.getElementById('win-time').textContent = formatTime(gameTime);
    document.getElementById('progress-fill').style.width = '100%';
    document.getElementById('player-name').value = '';
    renderLeaderboard();
    document.getElementById('win-screen').style.display = 'flex';

    document.getElementById('save-score-btn').onclick = function () {
      const name = document.getElementById('player-name').value.trim() || 'Anonymous';
      const scores = loadScores();
      scores.push({ name, score, attempts, time: gameTime, date: new Date().toLocaleDateString() });
      scores.sort((a, b) => b.score - a.score || a.time - b.time || a.attempts - b.attempts);
      scores.splice(10);
      localStorage.setItem('paiu_scores', JSON.stringify(scores));
      this.textContent = 'Saved!';
      this.disabled = true;
      renderLeaderboard();
    };
  }

  document.querySelectorAll('.iu-region').forEach(region => {
    region.addEventListener('click', function () {
      if (!current) return;
      attempts++;
      updateScore();

      if (this.id.toLowerCase() === current.toLowerCase()) {
        score++;
        const wasCrown = firstGuess;
        playSound('correct');
        this.classList.add('correct');
        this.style.pointerEvents = 'none';
        addLabel(this, wasCrown);
        updateIUList(this.id, wasCrown);
        document.getElementById('feedback').style.color = '#1D9E75';
        document.getElementById('feedback').textContent = wasCrown ? '👑 Perfect!' : 'Correct!';
        queue.shift();
        updateScore();
        setTimeout(nextQuestion, 600);
      } else {
        firstGuess = false;
        playSound('wrong');
        this.classList.add('wrong');
        document.getElementById('feedback').style.color = '#E24B4A';
        document.getElementById('feedback').textContent = 'Try again';
        setTimeout(() => this.classList.remove('wrong'), 300);
      }
    });
  });

  function playSound(type) {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (type === 'correct') {
      [[523, 0, 0.12], [784, 0.12, 0.25], [1047, 0.22, 0.45]].forEach(([freq, start, end]) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'sine'; o.frequency.value = freq;
        g.gain.setValueAtTime(0.35, ctx.currentTime + start);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + end);
        o.start(ctx.currentTime + start); o.stop(ctx.currentTime + end);
      });
      const bufSize = ctx.sampleRate * 0.4;
      const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufSize) * 0.15;
      const src = ctx.createBufferSource();
      src.buffer = buf; src.connect(ctx.destination);
      src.start(ctx.currentTime + 0.05);
    } else {
      [[300, 0, 0.15], [220, 0.15, 0.35], [160, 0.3, 0.55]].forEach(([freq, start, end]) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'sawtooth'; o.frequency.value = freq;
        g.gain.setValueAtTime(0.25, ctx.currentTime + start);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + end);
        o.start(ctx.currentTime + start); o.stop(ctx.currentTime + end);
      });
    }
  }

  function addLabel(groupEl, crown) {
    const num = groupEl.id.replace(/^iu/i, '');
    const bb = groupEl.getBBox();
    const cx = bb.x + bb.width / 2;
    const cy = bb.y + bb.height / 2;
    const imgSize = Math.min(Math.max(Math.min(bb.width, bb.height) * 0.55, 22), 55);
    const ns = 'http://www.w3.org/2000/svg';

    // Photo
    const img = document.createElementNS(ns, 'image');
    img.setAttribute('href', 'data:image/png;base64,' + THUMBS_IMG);
    img.setAttribute('x', cx - imgSize / 2);
    img.setAttribute('y', cy - imgSize * 0.65);
    img.setAttribute('width', imgSize);
    img.setAttribute('height', imgSize);
    img.setAttribute('pointer-events', 'none');
    img.setAttribute('style', 'mix-blend-mode:multiply');
    groupEl.appendChild(img);

    // Number (+ crown emoji if first guess)
    const text = document.createElementNS(ns, 'text');
    text.setAttribute('x', cx);
    text.setAttribute('y', cy + imgSize * 0.52);
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('dominant-baseline', 'central');
    text.setAttribute('pointer-events', 'none');
    text.textContent = crown ? '👑' + num : num;
    groupEl.appendChild(text);
  }

  function initIUList() {
    const container = document.getElementById('iu-list-items');
    container.innerHTML = Array.from({length: 29}, (_, i) => i + 1)
      .map(n => `<div class="iu-item" id="iu-item-${n}">IU ${n}</div>`)
      .join('');
  }

  function updateIUList(id, crown) {
    const num = id.replace(/^iu/i, '');
    const el = document.getElementById('iu-item-' + num);
    if (!el) return;
    el.classList.add(crown ? 'crown' : 'done');
    el.textContent = crown ? '👑 IU ' + num : '✓ IU ' + num;
  }

  initGame();
</script>
